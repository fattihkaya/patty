name: pet_ai
description: AI-powered pet tracking application with Supabase backend
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  flutter_localizations:
    sdk: flutter
  supabase_flutter: ^2.12.0

  # State Management
  provider: ^6.1.2

  # Image Picker
  image_picker: ^1.0.7

  # AI Integration
  google_generative_ai: ^0.4.7

  # UI & Aesthetics
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # HTTP Client
  http: ^1.2.0

  # Local Storage
  shared_preferences: ^2.2.2

  # Date Formatting
  intl: ^0.20.2

  # UI Components
  cupertino_icons: ^1.0.6
  shimmer: ^3.0.0
  table_calendar: ^3.2.0
  share_plus: ^7.2.2
  fl_chart: ^0.66.0
  syncfusion_flutter_charts: 32.1.22
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # In-App Purchases (RevenueCat)
  purchases_flutter: ^8.1.2
  purchases_ui_flutter: ^8.1.2

  # URL Launcher (for affiliate links)
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.5

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#0F172A"
  image: "assets/icon/app_icon.png"
  android_12:
    image: "assets/icon/app_icon.png"
    color: "#0F172A"
  fullscreen: true
  ios: true
  android: true

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/icon/app_icon.png
